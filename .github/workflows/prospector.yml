name: LeadForge Prospector

on:
  schedule:
    - cron: '53 6 * * *'  # ~8:53 hora española (UTC+2 verano) — minuto no redondo para evitar la cola de GitHub Actions en horas en punto y llegar cerca de las 9:00
  workflow_dispatch:      # También permite lanzarlo manualmente

concurrency:
  group: prospector
  cancel-in-progress: false  # no cancelar un envío real a medias; solo evita que se pisen dos runs

jobs:
  prospect:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # subido desde 60 al paralelizar el envío (día 15 de rampa llega a 500/día); con guardado incremental, un corte por timeout ya no duplica envíos, solo manda menos ese día
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests dnspython beautifulsoup4

      - name: Ejecutar prospector
        env:
          BREVO_API_KEY:  ${{ secrets.BREVO_API_KEY }}
          MY_EMAIL:       ${{ secrets.MY_EMAIL }}
          SENDER_NAME:    ${{ secrets.SENDER_NAME }}
        run: python prospector.py

      - name: Guardar emails enviados y CRM
        run: |
          git config user.name "prospector-bot"
          git config user.email "bot@leadforge.es"
          git add sent_emails.json crm_data.json warmup_state.json
          git diff --staged --quiet || git commit -m "chore: actualizar sent_emails y crm"
          git pull --rebase origin main
          git push
